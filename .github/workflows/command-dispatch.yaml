on:
  workflow_call:
    secrets:
      token:
        required: true

jobs:
  launcher:
    runs-on: ubuntu-latest
    steps:
      - name: Command Dispatch
        uses: peter-evans/slash-command-dispatch@e1b4e266bc781656359bb7e462e228daf68c04f6 # v5.0.0
        with:
          token: ${{ secrets.token }}
          reaction-token: ${{ secrets.token }}
          permission: write
          issue-type: pull-request
          commands: |-
            rebase
            update-prep
